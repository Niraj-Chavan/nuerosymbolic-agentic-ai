[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that need a database or external services
    asyncio: marks tests that need an event loop

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

env =
    ENVIRONMENT=test
    LLM_PROVIDER=mock
    DATABASE_URL=sqlite+aiosqlite:///./test.db

log_cli = true
log_cli_level = WARNING
log_cli_format = %(levelname)-7s | %(name)s | %(message)s
