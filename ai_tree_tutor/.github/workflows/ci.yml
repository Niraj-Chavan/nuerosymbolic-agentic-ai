name: CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
      - "docker-compose*.yml"
      - "Dockerfile*"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Ruff
        run: ruff check app/ tests/ --output-format=github
      - name: MyPy
        run: mypy app/ --ignore-missing-imports --warn-unused-ignores || true

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: ai_tutor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        group: [trees, agents, api]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-timeout
      - name: Run Alembic migrations (test DB)
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/ai_tutor_test
        run: |
          alembic upgrade head
      - name: Run ${{ matrix.group }} tests
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/ai_tutor_test
          LLM_PROVIDER: mock
        run: |
          pytest tests/test_${{ matrix.group }}/ \
            -v --tb=short --timeout=60 -m "not slow" \
            --junitxml=reports/${{ matrix.group }}.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.group }}
          path: backend/reports/${{ matrix.group }}.xml

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Coverage
        env:
          LLM_PROVIDER: mock
        run: |
          pytest tests/ -v --cov=app --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage_html --cov-report=term-missing \
            -m "not slow"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/reports/coverage_html

  docker:
    name: Build & Push Docker
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:backend-latest,${{ env.DOCKER_IMAGE }}:backend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:frontend-latest,${{ env.DOCKER_IMAGE }}:frontend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy via docker-compose
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} '
            cd /opt/ai-tree-tutor
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker image prune -f
          '

  notify-failure:
    name: Slack Notification
    needs: [test, coverage, docker, deploy-staging]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack alert
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "channel": "#deployments",
              "username": "GitHub Actions",
              "text": "❌ *CI/CD Pipeline Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
